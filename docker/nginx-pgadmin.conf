# HTTPS/도메인 접속 시 pgAdmin이 올바른 URL을 쓰도록 스킴 전달
# (리버스 프록시가 X-Forwarded-Proto를 넘기면 사용, 없으면 $scheme)
map $http_x_forwarded_proto $pgadmin_scheme {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;

    location /pgadmin4/ {
        proxy_pass http://pgadmin:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $pgadmin_scheme;
        proxy_set_header X-Scheme $pgadmin_scheme;
        proxy_set_header X-Script-Name /pgadmin4;
        proxy_redirect off;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /pgadmin4 {
        return 301 $pgadmin_scheme://$host:$server_port/pgadmin4/;
    }
}
